name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit tests (py ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # First run downloads the FastEmbed model (~130 MB); cache it across runs.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/fastembed
            ~/.cache/huggingface
          key: embed-model-${{ runner.os }}

      # Gating suite: the stable, self-contained unit tests.
      # Excluded here (tracked in separate issues, run non-blocking below):
      #   - tests/unit/test_performance.py, tests/unit/test_passport.py:
      #       import `server` and call the FastMCP tool `.fn` attribute, so they
      #       are coupled to the exact fastmcp version — re-enable once fastmcp
      #       is pinned.
      #   - tests/ui: currently broken (patches a symbol the module no longer
      #       exposes).
      #   - tests/integration: needs a live server/runtime.
      - name: Run unit tests (gating)
        run: |
          python -m pytest tests/unit \
            --ignore=tests/unit/test_performance.py \
            --ignore=tests/unit/test_passport.py \
            -q

  full-suite:
    name: full suite (informational, non-blocking)
    runs-on: ubuntu-latest
    # Does NOT block merge: surfaces the known-failing suites without gating.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/fastembed
            ~/.cache/huggingface
          key: embed-model-${{ runner.os }}

      - name: Run entire test suite (visibility only)
        run: python -m pytest -q
